version: "3.9"

services:
  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    environment:
      FRONTEND_BASE_URL: http://localhost:4173
      CORS_ORIGIN: http://localhost:4173,http://127.0.0.1:4173
    ports:
      - "8080:8080"
    volumes:
      - qrdine-db:/app

  frontend:
    build:
      context: .
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_WS_URL: ws://localhost:8080/ws
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  qrdine-db:
