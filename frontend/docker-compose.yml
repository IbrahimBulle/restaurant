version: "3.9"

services:
  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env.example
    environment:
      FRONTEND_BASE_URL: https://qrdinehotel.netlify.app/
      CORS_ORIGIN: https://qrdinehotel.netlify.app/
    ports:
      - "8080:8080"
    volumes:
      - qrdine-db:/app

  frontend:
    build:
      context: .
    environment:
      VITE_API_URL: https://restaurantbackend-w0jj.onrender.com
      VITE_WS_URL: wss://restaurantbackend-w0jj.onrender.com/ws
    ports:
      - "4173:4173"
    depends_on:
      - backend

volumes:
  qrdine-db:
