<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QRDine</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f5ee;
        color: #17201c;
        font-family: Inter, system-ui, sans-serif;
      }
      main {
        width: min(92vw, 520px);
        border: 1px solid #ddd7cb;
        border-radius: 8px;
        background: white;
        padding: 28px;
        box-shadow: 0 20px 45px rgba(20, 24, 31, 0.08);
      }
      a {
        color: #1d6b58;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QRDine scaffold is ready</h1>
      <p>The production app now lives in <strong>frontend/</strong> and the Go API lives in <strong>backend/</strong>.</p>
      <p>Run <code>docker compose up --build</code>, then open <a href="http://localhost:5173">localhost:5173</a>.</p>
    </main>
  </body>
</html>
