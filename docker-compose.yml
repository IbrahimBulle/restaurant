services:
  api:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      HTTP_ADDR: :8080
      DATABASE_URL: file:/data/restaurant.db?_pragma=foreign_keys(1)&_busy_timeout=5000
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:8088
    volumes:
      - restaurant-data:/data
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  restaurant-data:
